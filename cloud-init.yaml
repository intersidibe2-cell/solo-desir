#cloud-config
# Solo — Installation automatique Hetzner
# Copier-coller ce fichier dans "Cloud Config" à la création du serveur

package_update: true
package_upgrade: true

packages:
  - nginx
  - postgresql
  - postgresql-contrib
  - git
  - curl
  - certbot
  - python3-certbot-nginx

runcmd:
  # Node.js 22
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt install -y nodejs

  # PostgreSQL
  - sudo -u postgres psql -c "CREATE USER solo WITH PASSWORD 'solo2024';"
  - sudo -u postgres psql -c "CREATE DATABASE solo OWNER solo;"
  - sudo -u postgres psql -c "ALTER USER solo CREATEDB;"

  # PM2
  - npm install -g pm2

  # Clone & install
  - git clone https://github.com/intersidibe2-cell/solo-desir.git /opt/solo
  - cd /opt/solo/backend && npm install

  # Config .env
  - |
    cat > /opt/solo/backend/.env << EOF
    NODE_ENV=production
    PORT=3000
    DATABASE_URL=postgresql://solo:solo2024@localhost:5432/solo
    JWT_SECRET=$(openssl rand -base64 32)
    JWT_REFRESH_SECRET=$(openssl rand -base64 32)
    BASE_URL=https://solodesir.com
    EOF

  # nginx config
  - |
    cat > /etc/nginx/sites-available/solo << EOF
    server {
        listen 80;
        server_name solodesir.com;
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade \$http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
            proxy_cache_bypass \$http_upgrade;
            client_max_body_size 5m;
        }
    }
    EOF
  - ln -sf /etc/nginx/sites-available/solo /etc/nginx/sites-enabled/default
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t && systemctl reload nginx

  # Firewall
  - ufw allow 22
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable

  # PM2 startup
  - cd /opt/solo/backend
  - pm2 start server.js --name solo
  - pm2 save
  - pm2 startup systemd -u root --hp /root

  # Done
  - echo "=== SOLO INSTALLED ===" > /opt/solo/INSTALLED.txt
