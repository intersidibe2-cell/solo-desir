services:
  - type: web
    name: solo-desir
    env: node
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BASE_URL
        value: https://solodesir.com
      - key: DATABASE_URL
        fromDatabase:
          name: solo-db
          property: connectionString

databases:
  - name: solo-db
    databaseName: solo
    plan: free
