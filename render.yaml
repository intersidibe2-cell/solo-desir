services:
  - type: web
    name: bizi
    env: node
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BASE_URL
        value: https://bizi.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: bizi-db
          property: connectionString

databases:
  - name: bizi-db
    databaseName: bizi
    plan: free
